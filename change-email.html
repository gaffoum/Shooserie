<!--
  Template Supabase — Confirm Signup (optionnel, à activer si tu veux que les
  nouveaux comptes confirment leur email avant de pouvoir se connecter).
  À coller dans : Dashboard Supabase → Authentication → Email Templates → "Confirm Signup"
  Variables dispo : {{ .ConfirmationURL }} {{ .Email }} {{ .SiteURL }}

  Sujet recommandé : Welcome to Shooserie — confirm your email
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Welcome to Shooserie</title>
</head>
<body style="margin:0; padding:0; background:#F5F5F5; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Inter',sans-serif; color:#0A0A0A;">
  <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="background:#F5F5F5; padding:32px 16px;">
    <tr>
      <td align="center">
        <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="max-width:480px; background:#FFFFFF; border:1px solid #E8E8E8; border-radius:16px; overflow:hidden;">
          <tr>
            <td align="center" style="padding:32px 28px 20px;">
              <div style="display:inline-block; font-family:'Outfit',-apple-system,sans-serif; font-weight:700; font-size:22px; letter-spacing:-0.01em; color:#0A0A0A;">
                SHOOSERIE<span style="color:#CE1141;">.</span>
              </div>
            </td>
          </tr>

          <tr>
            <td style="padding:0 28px 8px;">
              <h1 style="margin:0 0 12px; font-family:'Outfit',-apple-system,sans-serif; font-size:20px; font-weight:600; color:#0A0A0A; line-height:1.3;">
                Welcome to Shooserie
              </h1>
              <p style="margin:0 0 12px; font-size:15px; line-height:1.55; color:#0A0A0A;">
                Manage your sneaker collection — live prices, barcode scan, photos.
              </p>
              <p style="margin:0 0 24px; font-size:15px; line-height:1.55; color:#0A0A0A;">
                Confirm your email address to activate your account:
              </p>

              <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%">
                <tr>
                  <td align="center" style="padding-bottom:24px;">
                    <a href="{{ .ConfirmationURL }}"
                       style="display:inline-block; padding:13px 28px; background:#CE1141; color:#FFFFFF; font-family:'Outfit',-apple-system,sans-serif; font-weight:600; font-size:13px; letter-spacing:0.06em; text-transform:uppercase; text-decoration:none; border-radius:8px;">
                      Confirm email
                    </a>
                  </td>
                </tr>
              </table>

              <p style="margin:0 0 8px; font-size:12px; line-height:1.55; color:#6B7280;">
                Or copy and paste this URL into your browser:
              </p>
              <p style="margin:0 0 24px; font-size:11px; line-height:1.5; word-break:break-all; font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; color:#6B7280;">
                {{ .ConfirmationURL }}
              </p>
            </td>
          </tr>

          <tr>
            <td style="padding:20px 28px 28px; border-top:1px solid #E8E8E8;">
              <p style="margin:0; font-size:11px; line-height:1.5; color:#A0A0A0;">
                Sent by Shooserie · <a href="{{ .SiteURL }}" style="color:#1D428A; text-decoration:none;">{{ .SiteURL }}</a>
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
