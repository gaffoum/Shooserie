<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0A0A0A" />
    <meta name="description" content="Shooserie — Gestion de collection de sneakers" />
    <title>Shooserie</title>
    <!-- Favicons (Option A monogram, generated from /branding/). The SVG
         scales from 16x16 all the way to retina displays without aliasing. -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.svg" />
    <link rel="mask-icon" href="/favicon.svg" color="#0A0A0A" />
    <!-- Polices auto-hébergées via @font-face (src/styles/fonts.css → /fonts/*.woff2).
         Aucun appel Google Fonts : conformité RGPD + perf. -->
    <link rel="preload" href="/fonts/outfit-v15-latin-700.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/outfit-v15-latin-regular.woff2" as="font" type="font/woff2" crossorigin />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
