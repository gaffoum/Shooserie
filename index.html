<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0A0A0A" />
    <meta name="description" content="Shooserie — Gestion de collection de sneakers" />
    <title>Shooserie</title>
    <!-- Icônes d'app (logo handoff « boîte étiquetée »). Suffixe -v2 sur
         l'apple-touch-icon = force iOS à ignorer son cache d'ancienne icône. -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon-v2.png" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="manifest" href="/manifest.json" />
    <!-- Polices auto-hébergées via @font-face (src/styles/fonts.css → /fonts/*.woff2).
         Aucun appel Google Fonts : conformité RGPD + perf. -->
    <link rel="preload" href="/fonts/outfit-v15-latin-700.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/outfit-v15-latin-regular.woff2" as="font" type="font/woff2" crossorigin />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
