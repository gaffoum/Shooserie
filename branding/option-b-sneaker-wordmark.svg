<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 200" width="640" height="200">
  <title>Shooserie — Option B — Sneaker mark + wordmark</title>
  <!-- Carré noir contenant la silhouette -->
  <rect x="0" y="0" width="200" height="200" rx="36" ry="36" fill="#0A0A0A"/>

  <!-- Silhouette stylisée d'une sneaker basse type AJ1 / Air Max, en blanc -->
  <g transform="translate(28, 70)" fill="#FFFFFF">
    <!-- Corps de la chaussure : tige + collier -->
    <path d="M 0 50
             C 0 35, 10 22, 28 18
             L 60 8
             C 72 4, 82 6, 90 14
             L 102 26
             C 110 32, 120 36, 132 38
             L 148 40
             C 156 41, 160 46, 160 52
             L 158 64
             C 156 70, 152 72, 146 72
             L 8 72
             C 3 72, 0 68, 0 62 Z"/>
    <!-- Logo Bred (swoosh-like) sur le côté -->
    <path d="M 38 38
             C 42 30, 52 26, 64 30
             L 72 36
             L 68 42
             L 60 38
             C 54 36, 48 38, 44 44 Z"
          fill="#CE1141"/>
  </g>

  <!-- Wordmark à droite -->
  <text
    x="240"
    y="100"
    font-family="'Outfit', 'Inter', -apple-system, sans-serif"
    font-weight="700"
    font-size="64"
    fill="#0A0A0A"
    dominant-baseline="central"
    letter-spacing="-1.5">SHOOSERIE</text>
  <!-- Point Bred signature -->
  <circle cx="588" cy="120" r="10" fill="#CE1141"/>
</svg>
